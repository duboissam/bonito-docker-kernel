name: Validate Pixel Docker kernel config

on:
  workflow_dispatch:
    inputs:
      device:
        description: Device config to validate
        required: true
        default: crosshatch
        type: choice
        options:
          - crosshatch
          - sargo
          - bonito
      kernel_ref:
        description: LineageOS kernel branch, tag, or commit
        required: false
        default: ""
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out workflow files
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates curl flex git \
            libelf-dev libssl-dev make python3

      - name: Install mkdtimg
        run: |
          set -euo pipefail
          scripts/install_mkdtimg.sh /usr/local/bin/mkdtimg

      - name: Load device config
        run: |
          set -euo pipefail
          source scripts/load_device_config.sh
          load_device_config "${{ inputs.device }}"
          kernel_ref="${{ inputs.kernel_ref }}"
          if [[ -z "$kernel_ref" ]]; then
            kernel_ref="$DEFAULT_KERNEL_REF"
          fi
          {
            echo "DEVICE_ID=$DEVICE_ID"
            echo "DEVICE_LABEL=$DEVICE_LABEL"
            echo "KERNEL_REPO=$KERNEL_REPO"
            echo "KERNEL_REF=$kernel_ref"
            echo "DEFAULT_KERNEL_REF=$DEFAULT_KERNEL_REF"
            echo "DEFCONFIG=$DEFCONFIG"
          } >> "$GITHUB_ENV"

      - name: Clone device kernel
        run: |
          set -euo pipefail

          git init kernel
          git -C kernel remote add origin "$KERNEL_REPO"

          if git ls-remote --exit-code --heads origin "$KERNEL_REF" >/dev/null 2>&1; then
            git -C kernel fetch --depth=1 origin "refs/heads/$KERNEL_REF"
            git -C kernel checkout --detach FETCH_HEAD
          elif git ls-remote --exit-code --tags origin "$KERNEL_REF" >/dev/null 2>&1; then
            git -C kernel fetch --depth=1 origin "refs/tags/$KERNEL_REF"
            git -C kernel checkout --detach FETCH_HEAD
          elif [[ "$KERNEL_REF" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            if git -C kernel fetch --depth=1 origin "$KERNEL_REF"; then
              git -C kernel checkout --detach FETCH_HEAD
            else
              git -C kernel fetch --depth=1000 origin "$DEFAULT_KERNEL_REF"
              git -C kernel checkout --detach "$KERNEL_REF"
            fi
          else
            git -C kernel fetch --depth=1 origin "$KERNEL_REF"
            git -C kernel checkout --detach FETCH_HEAD
          fi

          git -C kernel rev-parse HEAD | tee kernel-commit.txt

      - name: Patch and resolve Docker kernel config
        working-directory: kernel
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/patch_docker_kernel.sh"
          "$GITHUB_WORKSPACE/scripts/patch_docker_kernel.sh" "$DEVICE_ID" "$GITHUB_WORKSPACE/kernel"
          bash "$GITHUB_WORKSPACE/scripts/check_docker_kernel_config.sh" out-docker/.config

      - name: Check source patches landed
        run: |
          if [[ -f kernel/net/netfilter/xt_qtaguid.c ]]; then
            grep -q 'stats = &no_dev_stats;' kernel/net/netfilter/xt_qtaguid.c
          else
            echo "kernel/net/netfilter/xt_qtaguid.c not present in this tree; skipping qtaguid workaround check"
          fi
          grep -q -- '--target=arm-linux-gnueabi' kernel/arch/arm64/kernel/vdso32/Makefile

      - name: Collect validation outputs
        if: always()
        run: |
          mkdir -p artifacts
          cp kernel-commit.txt artifacts/ 2>/dev/null || true
          cp kernel/out-docker/.config artifacts/resolved-kernel-config 2>/dev/null || true
          cp "kernel/arch/arm64/configs/$DEFCONFIG" "artifacts/$DEFCONFIG" 2>/dev/null || true
          du -ah artifacts || true

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE_ID }}-docker-config-validation-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
