name: Build bonito Docker kernel

on:
  workflow_dispatch:
    inputs:
      kernel_ref:
        description: LineageOS kernel branch, tag, or commit
        required: true
        default: lineage-22.2
      clang_ref:
        description: Android Clang prebuilt branch
        required: true
        default: android-12.0.0_r0.35

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out workflow files
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates ccache curl device-tree-compiler flex git \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libelf-dev libssl-dev lld llvm make mkbootimg python3 rsync unzip xz-utils zip

      - name: Install mkdtimg
        run: |
          set -euo pipefail
          curl -fsSL 'https://android.googlesource.com/platform/system/libufdt/+/refs/heads/android10-release/utils/src/mkdtboimg.py?format=TEXT' \
            | base64 --decode \
            | sudo tee /usr/local/bin/mkdtimg >/dev/null
          sudo chmod +x /usr/local/bin/mkdtimg
          mkdtimg help cfg_create

      - name: Clone LineageOS bonito kernel
        run: |
          git clone --depth=1 --branch "${{ inputs.kernel_ref }}" \
            https://github.com/LineageOS/android_kernel_google_msm-4.9.git kernel
          git -C kernel rev-parse HEAD | tee kernel-commit.txt

      - name: Clone Android Clang toolchain
        run: |
          git clone --depth=1 --branch "${{ inputs.clang_ref }}" \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-prebuilt
          echo "Toolchain top-level contents:"
          find "$GITHUB_WORKSPACE/clang-prebuilt" -maxdepth 2 -mindepth 1 -print | sort | head -200

          CLANG_BIN="$(find "$GITHUB_WORKSPACE/clang-prebuilt" \
            -path '*/bin/clang' -print | sort -V | tail -1)"

          if [[ -z "$CLANG_BIN" || ! -x "$CLANG_BIN" ]]; then
            echo "ERROR: Could not locate an executable */bin/clang in the cloned prebuilt." >&2
            exit 1
          fi

          CLANG_DIR="$(dirname "$CLANG_BIN")"
          echo "CLANG_DIR=$CLANG_DIR" >> "$GITHUB_ENV"
          echo "Using Clang from: $CLANG_DIR"
          "$CLANG_BIN" --version

      - name: Patch Docker kernel options
        run: |
          chmod +x scripts/patch_bonito_docker_kernel.sh
          scripts/patch_bonito_docker_kernel.sh "$GITHUB_WORKSPACE/kernel"

      - name: Build kernel
        working-directory: kernel
        env:
          ARCH: arm64
          SUBARCH: arm64
          CC: clang
          LD: aarch64-linux-gnu-ld.bfd
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          STRIP: llvm-strip
          LLVM_IAS: "1"
          CLANG_TRIPLE: aarch64-linux-gnu-
          CROSS_COMPILE: aarch64-linux-gnu-
          CROSS_COMPILE_ARM32: arm-linux-gnueabi-
          CROSS_COMPILE_COMPAT: arm-linux-gnueabi-
          KBUILD_BUILD_USER: github-actions
          KBUILD_BUILD_HOST: bonito-docker
        run: |
          export PATH="$CLANG_DIR:$PATH"
          export KBUILD_BUILD_TIMESTAMP="$(date -u -d @${SOURCE_DATE_EPOCH:-$(date +%s)} '+%a %b %d %T UTC %Y')"
          make O=out-docker ARCH=arm64 bonito_defconfig
          make O=out-docker ARCH=arm64 olddefconfig
          make O=out-docker ARCH=arm64 -j"$(nproc)" \
            CC=clang LD=aarch64-linux-gnu-ld.bfd AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            KCFLAGS=-Wno-error

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p artifacts
          cp kernel-commit.txt artifacts/ 2>/dev/null || true
          cp kernel/out-docker/.config artifacts/resolved-kernel-config 2>/dev/null || true
          cp kernel/arch/arm64/configs/bonito_defconfig artifacts/bonito_defconfig 2>/dev/null || true
          cp kernel/out-docker/arch/arm64/boot/Image.lz4-dtb artifacts/ 2>/dev/null || true
          cp kernel/out-docker/arch/arm64/boot/Image.gz-dtb artifacts/ 2>/dev/null || true
          cp kernel/out-docker/arch/arm64/boot/Image artifacts/ 2>/dev/null || true
          cp kernel/out-docker/vmlinux artifacts/ 2>/dev/null || true
          find kernel/out-docker -name '*.ko' -print0 2>/dev/null | \
            tar --null -T - -czf artifacts/modules.tar.gz 2>/dev/null || true
          du -ah artifacts || true

      - name: Upload kernel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bonito-docker-kernel-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
